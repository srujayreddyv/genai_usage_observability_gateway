name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize locked dependencies
        run: uv sync --locked --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src tests

      - name: Run tests with coverage
        run: >-
          uv run pytest
          --cov=genai_usage_observability_gateway
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=85

      - name: Validate application import
        run: >-
          uv run python -c
          "import genai_usage_observability_gateway as package;
          print(package.__version__)"

  container:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build image
        run: docker build --tag genai-usage-observability-gateway:test .

      - name: Verify nonroot runtime and application import
        run: >-
          docker run --rm --entrypoint python
          genai-usage-observability-gateway:test
          -c "import os; assert os.getuid() == 10001;
          import genai_usage_observability_gateway"
